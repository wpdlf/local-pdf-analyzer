name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run package

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            !dist/*unpacked*
            !dist/__*
