name: Build and Release

on:
  push:
    tags:
      - 'v*'

# R37 P1 (v0.18.23): 동일 태그를 재푸시(force-push)하거나 거의 동시에 별개 v* 태그가 들어오면
# 두 release 잡이 병렬로 실행되어 softprops/action-gh-release 의 `append_body: true` + SHA256SUMS
# 파일 업로드가 race 한다 (두 번째 잡이 첫 번째의 SHA-256 라인을 덮어쓰거나, 동일 해시 라인을
# 중복 append). cancel-in-progress: false — 태그는 이미 push 되어 있고 이미 실행 중인 빌드를
# 죽이면 release 자산이 비어 사용자가 다시 태깅해야 하므로 직렬화만 한다. tag 단위 group 으로
# 묶어 서로 다른 태그(예: v0.18.23 과 v0.19.0)는 그대로 병렬 허용.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    # R28: Windows 회귀(경로 구분자, pwsh 인용, cpSync 동작)를 사전 차단하기 위해 OS matrix 도입.
    # macOS는 release 빌드에서 제외했으므로 test에서도 제외.
    strategy:
      # v0.18.19 patch R32 P3: fail-fast false — Ubuntu 플레이크가 Windows 빌드를 cancel 하지
      # 않도록. 태그가 이미 push 된 상태에서 cancel 되면 재빌드를 위해 재태깅이 필요한데,
      # 플레이크 회수가 잦은 npm-cache miss 등으로 사용자가 release 흐름을 막히는 비용이
      # Windows 빌드 1개 추가 실행 비용보다 크다. Ubuntu 시그널은 그대로 보존.
      fail-fast: false
      matrix:
        # windows-2025 는 2026-06-08~15 에 GitHub 측에서 VS2022→VS2026 으로 자동 마이그레이션된다
        # (windows-latest/windows-2025 라벨 공통, 투명 리다이렉트라 라벨 변경 불필요).
        # 본 프로젝트는 네이티브 모듈(node-gyp/electron-rebuild)이 0개이고 빌드가 electron-vite
        # 번들링 + electron-builder NSIS(makensis) + Sigstore 로 VS 툴체인에 의존하지 않으므로
        # VS 버전 전환의 영향을 받지 않는다. windows-2025-vs2026 라벨은 테스트 전용(마이그레이션
        # 후 windows-2025 로 환원)이라 영구 핀 금지. VS2022 고정이 필요해지면(향후 네이티브 추가 시)
        # windows-2022 로 변경할 것.
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      # actions/checkout@v6.0.2 (Node 24)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.4.0 (Node 24)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.11'
          cache: npm

      - run: npm ci

      # R31 (v0.18.18 patch): package-lock.json drift 게이트 — test.yml 과 동일 로직.
      # v0.18.19 patch R32 P2: lockfileVersion 3 은 root `version` 과 `packages[""].version`
      # 두 곳에 버전이 박혀 있다. 이전 게이트는 root 만 봤기 때문에 hand-edit 으로 둘이 어긋
      # 나면 `npm ci` 가 경고 + cache 무효화를 일으키는 채로 CI 가 그린이었다. 둘 다 검사.
      - name: Verify lockfile version sync
        shell: bash
        run: |
          pkg_ver=$(node -p "require('./package.json').version")
          lock_root_ver=$(node -p "require('./package-lock.json').version")
          lock_pkgs_ver=$(node -p "require('./package-lock.json').packages[''].version")
          if [ "$pkg_ver" != "$lock_root_ver" ] || [ "$pkg_ver" != "$lock_pkgs_ver" ]; then
            echo "::error::package.json version ($pkg_ver) drift — lock root=$lock_root_ver packages['']=$lock_pkgs_ver"
            exit 1
          fi

      # R28: noUncheckedIndexedAccess 등 tsconfig strict 게이트가 CI에서 항상 검증되도록 함.
      - run: npx tsc --noEmit

      - run: npm test

  build-windows:
    needs: test
    # windows-2025: 2026-06-15 까지 VS2026 으로 자동 전환되나 본 빌드는 VS 무의존(상단 matrix 주석 참조).
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.11'
          cache: npm

      - run: npm ci

      - run: npm run build && npx electron-builder --publish never

      # R37 P2 (v0.18.23): 빌드 실패 시 dist/ 와 out/ 를 회수해야 재현 디버깅이 가능하다.
      # 현재까지는 stderr 만 GitHub Actions 로그에 남고 NSIS 중간 산출물(makensis 로그),
      # electron-vite 번들 산출물, electron-builder app-builder 결과물이 worker 종료와 함께 사라졌다.
      # if: failure() — 성공 시 30~150MB artifact 업로드를 피해 일반 흐름의 잡 시간을 늘리지 않음.
      # path 는 dist/ + out/ 만 (workspace 내부). electron-builder 글로벌 캐시(%LOCALAPPDATA%)
      # 는 Windows runner 의 ~ 확장이 불안정해 제외; 필요해지면 별도 step 으로 LOCALAPPDATA 사용.
      # actions/upload-artifact@v4.6.2 (gh api 로 tag→commit SHA 확인 후 핀)
      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-windows-failure-${{ github.run_id }}
          path: |
            dist/
            out/
          if-no-files-found: warn
          retention-days: 7

      - name: Compute SHA256 for installer
        id: hash
        shell: pwsh
        run: |
          $file = (Get-ChildItem dist/*Setup*.exe | Select-Object -First 1).FullName
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
          $name = (Split-Path $file -Leaf)
          "filename=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$hash"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "$hash  $name" | Out-File -FilePath dist/SHA256SUMS-windows.txt -Encoding ascii

      # actions/attest-build-provenance@v4.1.0
      - name: Attest build provenance (Windows)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/*Setup*.exe

      # softprops/action-gh-release@v2.6.2
      - name: Upload installer to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/*Setup*.exe
            dist/SHA256SUMS-windows.txt
          append_body: true
          body: |
            ### Windows installer SHA-256
            ```
            ${{ steps.hash.outputs.sha256 }}  ${{ steps.hash.outputs.filename }}
            ```

  # R28: macOS dmg는 코드사인/공증 자격이 없어 Gatekeeper에 차단됨 (사용자가 `xattr -d`를
  # 직접 실행해야 열 수 있는 상태로 출시되던 문제). Apple Developer ID + APPLE_ID/PASSWORD/TEAM_ID
  # 시크릿 + `mac.notarize` electron-builder 구성을 추가하기 전까지 macOS 빌드를 비활성화한다.
  # 복구 방법: 위 시크릿을 등록한 뒤 build-mac 잡과 package.json 의 build.mac 블록에 notarize 설정을 추가하고
  # test.yml matrix에 macos-latest를 다시 포함하면 된다.
  #
  # build-mac:
  #   needs: test
  #   runs-on: macos-latest
  #   ...
