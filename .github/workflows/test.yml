name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # actions/checkout@v6.0.2 (Node 24 호환, v0.18.11 R29 #1 마이그레이션)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.4.0 (Node 24 호환)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # R28: tsconfig strict 게이트(noUncheckedIndexedAccess 등)가 PR/push 단계에서 항상 검증되도록 함.
      - run: npx tsc --noEmit

      - run: npm test

      # R29 #1: supply-chain 가시성 — high 이상의 알려진 취약점을 PR/push 단계에서 빠르게 노출.
      # 현재 알려진 dev-only 의존성(vite/postcss/xmldom/ip-address) 은 major bump 가 필요해 별도 라운드 예정.
      # 그동안 회귀 도입을 막기 위해 high 이상만 경고로 출력하고 빌드는 막지 않는다 (`|| true`).
      - name: npm audit (advisory, non-blocking)
        run: npm audit --audit-level=high || true
