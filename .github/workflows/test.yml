name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # actions/checkout@v6.0.2 (Node 24 호환, v0.18.11 R29 #1 마이그레이션)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.4.0 (Node 24 호환)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.11'
          cache: npm

      - run: npm ci

      # R31 (v0.18.18 patch): package-lock.json root version 이 package.json 과
      # drift 됐는지 검증. v0.18.17 → v0.18.18 로 넘어갈 때 자동화 미구현으로
      # drift 가 재발생한 사례 (R30 발견) → 매 PR/release 에서 강제.
      - name: Verify lockfile version sync
        shell: bash
        run: |
          pkg_ver=$(node -p "require('./package.json').version")
          lock_ver=$(node -p "require('./package-lock.json').version")
          if [ "$pkg_ver" != "$lock_ver" ]; then
            echo "::error::package.json version ($pkg_ver) != package-lock.json version ($lock_ver)"
            echo "Run 'npm install --package-lock-only' and commit the result."
            exit 1
          fi
          echo "lockfile sync OK: $pkg_ver"

      # R28: tsconfig strict 게이트(noUncheckedIndexedAccess 등)가 PR/push 단계에서 항상 검증되도록 함.
      - run: npx tsc --noEmit

      - run: npm test

      # R29 #1: supply-chain 가시성 — high 이상의 알려진 취약점을 PR/push 단계에서 빠르게 노출.
      # 현재 알려진 dev-only 의존성(vite/postcss/xmldom/ip-address) 은 major bump 가 필요해 별도 라운드 예정.
      # 그동안 회귀 도입을 막기 위해 high 이상만 경고로 출력하고 빌드는 막지 않는다.
      # R31 P2 (v0.18.19): step summary 에 advisory 결과 명시 노출.
      # `continue-on-error: true` 가 step 실패는 흡수했지만 결과가 raw 로그에만 묻혀
      # 사용자가 advisory 존재를 인지하기 어려웠음. JSON 으로 파싱해 GITHUB_STEP_SUMMARY 에 카운트 출력.
      #
      # v0.18.20 R32 P2: `if: always()` 추가 — 이전엔 npm test (line 45) 실패 시 audit step
      # 이 통째로 skip 되어 supply-chain 신호가 GITHUB_STEP_SUMMARY 에서 사라졌다. red CI
      # 상황에서 advisory 가 가장 봐야 하는데 가려지던 결함 (R32 Surface 4 P2). step 자체는
      # 여전히 `continue-on-error: true` 라 non-blocking 성질 유지.
      - name: npm audit (advisory, non-blocking)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
          if [ -z "$AUDIT_JSON" ]; then
            echo "## npm audit" >> "$GITHUB_STEP_SUMMARY"
            echo ":warning: audit 실행 실패 (네트워크 등)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          HIGH=$(node -e "const j=JSON.parse(process.argv[1]);const v=j.metadata?.vulnerabilities||{};console.log((v.high||0)+(v.critical||0));" "$AUDIT_JSON")
          MODERATE=$(node -e "const j=JSON.parse(process.argv[1]);const v=j.metadata?.vulnerabilities||{};console.log(v.moderate||0);" "$AUDIT_JSON")
          LOW=$(node -e "const j=JSON.parse(process.argv[1]);const v=j.metadata?.vulnerabilities||{};console.log(v.low||0);" "$AUDIT_JSON")
          {
            echo "## npm audit (advisory)"
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| high+critical | $HIGH |"
            echo "| moderate | $MODERATE |"
            echo "| low | $LOW |"
            if [ "$HIGH" -gt 0 ]; then
              echo ""
              echo ":warning: **$HIGH** high/critical advisory 발견. 빌드는 통과하지만 review 필요 (`npm audit --audit-level=high` 로 상세).";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # human-readable 출력도 logs 에 남김 (기존 동작 보존).
          npm audit --audit-level=high || true
