name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # actions/checkout@v6.0.2 (Node 24 호환, v0.18.11 R29 #1 마이그레이션)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.4.0 (Node 24 호환)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.11'
          cache: npm

      - run: npm ci

      # R31 (v0.18.18 patch): package-lock.json root version 이 package.json 과
      # drift 됐는지 검증. v0.18.17 → v0.18.18 로 넘어갈 때 자동화 미구현으로
      # drift 가 재발생한 사례 (R30 발견) → 매 PR/release 에서 강제.
      # v0.18.19 patch R32 P2: lockfileVersion 3 의 `packages[""].version` 도 같이 검증.
      # 둘 중 하나만 손으로 수정해도 `npm ci` 가 cache 키 무효화 + 경고를 발생시키지만
      # 직전 게이트는 root 만 봐서 silent 통과하던 결함 (R32 Surface 4 P3).
      - name: Verify lockfile version sync
        shell: bash
        run: |
          pkg_ver=$(node -p "require('./package.json').version")
          lock_root_ver=$(node -p "require('./package-lock.json').version")
          lock_pkgs_ver=$(node -p "require('./package-lock.json').packages[''].version")
          if [ "$pkg_ver" != "$lock_root_ver" ] || [ "$pkg_ver" != "$lock_pkgs_ver" ]; then
            echo "::error::package.json version ($pkg_ver) drift — lock root=$lock_root_ver packages['']=$lock_pkgs_ver"
            echo "Run 'npm install --package-lock-only' and commit the result."
            exit 1
          fi
          echo "lockfile sync OK: $pkg_ver (root + packages[''])"

      # R28: tsconfig strict 게이트(noUncheckedIndexedAccess 등)가 PR/push 단계에서 항상 검증되도록 함.
      - run: npx tsc --noEmit

      - run: npm test

      # R29 #1: supply-chain 가시성 — high 이상의 알려진 취약점을 PR/push 단계에서 빠르게 노출.
      # 현재 알려진 dev-only 의존성(vite/postcss/xmldom/ip-address) 은 major bump 가 필요해 별도 라운드 예정.
      # 그동안 회귀 도입을 막기 위해 high 이상만 경고로 출력하고 빌드는 막지 않는다.
      # R31 P2 (v0.18.19): step summary 에 advisory 결과 명시 노출.
      # `continue-on-error: true` 가 step 실패는 흡수했지만 결과가 raw 로그에만 묻혀
      # 사용자가 advisory 존재를 인지하기 어려웠음. JSON 으로 파싱해 GITHUB_STEP_SUMMARY 에 카운트 출력.
      #
      # v0.18.20 R32 P2: `if: always()` 추가 — 이전엔 npm test (line 45) 실패 시 audit step
      # 이 통째로 skip 되어 supply-chain 신호가 GITHUB_STEP_SUMMARY 에서 사라졌다. red CI
      # 상황에서 advisory 가 가장 봐야 하는데 가려지던 결함 (R32 Surface 4 P2). step 자체는
      # 여전히 `continue-on-error: true` 라 non-blocking 성질 유지.
      - name: npm audit (advisory, non-blocking)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          # v0.18.19 patch R34 P1 (R33 회귀 fix): `if: always()` 가 npm ci 실패 후에도 본 step 을
          # 실행하는데, node_modules 부재 시 npm audit 은 error JSON 을 반환해 이전 파서가 모든
          # 값을 0 으로 떨어뜨려 "취약점 없음" 으로 거짓 보고하던 결함 (R33 Surface 4 P3).
          # node_modules 존재 여부를 선행 검사하고, 부재 시 명시적으로 "audit 미실행" 으로 분기.
          if [ ! -d node_modules ]; then
            {
              echo "## npm audit"
              echo ""
              echo ":warning: audit 미실행 — \`node_modules\` 디렉터리 부재 (선행 \`npm ci\` 실패 가능성). 본 단계는 advisory 라 빌드는 통과하지만 supply-chain 가시성이 일시 후퇴함."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
          if [ -z "$AUDIT_JSON" ]; then
            echo "## npm audit" >> "$GITHUB_STEP_SUMMARY"
            echo ":warning: audit 실행 실패 (네트워크 등)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # v0.18.19 patch R32 P2: 단일 node 호출로 세 값을 한 번에 추출.
          # 이전엔 동일 audit JSON 을 세 번 spawn 으로 재파싱했고, set +e + ARG_MAX edge 에서
          # 한 호출이 실패하면 빈 문자열로 떨어져 다음 `[ "$X" -gt 0 ]` 가 silent 산식 오류
          # 를 일으키는 fragility 가 있었음. read 로 묶어 1회 spawn 으로 합친다.
          # R34 P1 (R33 회귀 fix): node 측에서 audit JSON 의 error 분기 (예: { error: {...} }) 도
          # 처리. 또 read 가 빈 stdin 받아 변수가 비는 경우 `: ${VAR:=0}` 디폴트로 shell 산식
          # 에러 (`[: -gt: unary operator expected`) 차단.
          AUDIT_PARSED=$(node -e "
            try {
              const j = JSON.parse(process.argv[1]);
              if (j && j.error) { console.log('ERROR'); process.exit(0); }
              const v = (j && j.metadata && j.metadata.vulnerabilities) || {};
              console.log((v.high||0)+(v.critical||0), v.moderate||0, v.low||0);
            } catch { console.log('ERROR'); }
          " "$AUDIT_JSON")
          if [ "$AUDIT_PARSED" = "ERROR" ]; then
            {
              echo "## npm audit"
              echo ""
              echo ":warning: audit JSON 파싱 실패 또는 npm 측 error 응답 — supply-chain 신호 일시 부재."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          read HIGH MODERATE LOW <<< "$AUDIT_PARSED"
          : "${HIGH:=0}" "${MODERATE:=0}" "${LOW:=0}"
          {
            echo "## npm audit (advisory)"
            echo ""
            echo "| Severity | Count |"
            echo "|---|---|"
            echo "| high+critical | $HIGH |"
            echo "| moderate | $MODERATE |"
            echo "| low | $LOW |"
            if [ "$HIGH" -gt 0 ]; then
              echo ""
              echo ":warning: **$HIGH** high/critical advisory 발견. 빌드는 통과하지만 review 필요 (`npm audit --audit-level=high` 로 상세).";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # human-readable 출력도 logs 에 남김 (기존 동작 보존).
          npm audit --audit-level=high || true
