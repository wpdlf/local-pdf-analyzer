<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP 주석:
      - R37 P5-1 (v0.18.23): script-src 'unsafe-inline' 제거. 아래 FOUC 방지 인라인 스크립트는
        sha256-EGIiDi9IsPjfDRlZm477C/K+ZowthNLgLs1uyBa5kxU= 로 화이트리스트. 인라인 스크립트
        본문이 변경되면 vitest 게이트(src/renderer/lib/__tests__/csp-inline-hash.test.ts)가
        실패해 hash 갱신을 강제한다. 새 인라인 스크립트 추가 시 동일 패턴(hash 추가 + 테스트
        갱신) 따를 것.
      - style-src 'unsafe-inline' 은 Tailwind + React 인라인 style 광범위 사용으로 제거 불가
        (script 가 없으면 style 단독 exfil 불가능, reachability 거의 0).
      - frame-src/child-src 'none': iframe 임베딩 차단 (마크다운/의존성 침해 시 탈출 경로 제거)
      - base-uri 'none': <base href="..."> 주입으로 상대 경로 탈취 차단
      - form-action 'none': 폼 submit 으로 외부 origin 데이터 전송 차단
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-EGIiDi9IsPjfDRlZm477C/K+ZowthNLgLs1uyBa5kxU='; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; worker-src 'self' blob:; object-src 'none'; frame-src 'none'; child-src 'none'; base-uri 'none'; form-action 'none'">
    <title>PDF 자료 분석기</title>
    <script>
      // FOUC 방지: React 마운트 전에 동기적으로 테마 클래스 적용.
      // 테마는 localStorage('theme')에 캐시되며, 실제 저장소는 main의 settings.json.
      // 캐시 없을 때는 OS prefers-color-scheme 사용(시스템 기본값과 일치).
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* localStorage 접근 실패는 무시 (first run 등) */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
